services:
  db:
    container_name: postgres_container
    image: postgres:14.17
    ports: 
      - 5000:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: 
      - ./postgres/data:/var/;ob/postgresql/data